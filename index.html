<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <header>
    <h1>🍴 Foodies Hub</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#menu">Menu</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h2>Delicious Food Delivered</h2>
    <p>Fresh | Tasty | Affordable</p>
    <button>Order Now</button>
  </section>

  <!-- Menu Section -->
  <section id="menu" class="menu">
    <h2>Our Menu</h2>

    <div class="menu-container">

      <div class="card">
        <img src="https://imgs.search.brave.com/asDxrNjeD4L2FAbWgk2q8jqDmCRPId_5cOR76dB5XS0/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly93d3cu/c2h1dHRlcnN0b2Nr/LmNvbS9pbWFnZS1w/aG90by9ob3QtY2hl/ZXN5LW1venphcmVs/bGEtcGl6emEtc2xp/Y2UtMjYwbnctMjYx/MTQzNDE4My5qcGc">
        <h3>Pizza</h3>
        <p>Cheesy and hot</p>
      </div>

      <div class="card">
        <img src="https://source.unsplash.com/300x200/?burger">
        <h3>Burger</h3>
        <p>Juicy and crispy</p>
      </div>

      <div class="card">
        <img src="https://cooklist.com/recipe/velvety-italian-pasta-delight-2712624">
        <h3>Pasta</h3>
        <p>Italian delight</p>
      </div>

    </div>
  </section>

  <!-- Contact Form -->
  <section id="contact" class="contact">
    <h2>Contact Us</h2>

    <form action="https://formsubmit.co/ayushssharmaa@gmail.com" method="POST">
      <br>

      <input type="text" name="name" placeholder="Your Name" required> <br>
      
      <input type="email" name="email" placeholder="Your Email" required> <br>
      
      <textarea name="message" placeholder="Your Message"></textarea><br>

      <button type="submit">Send Message</button>

      <!-- Hidden -->
      <input type="hidden" name="_captcha" value="false">

    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Foodies Hub</p>
  </footer>

</body>
</html>
